openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Wealth Levels API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: dashboard
    description: Dashboard and character data
  - name: quests
    description: Quest management
  - name: skills
    description: Skills management
  - name: builds
    description: Guild Hall / builds management
  - name: budget
    description: Budget tracking
  - name: wealth
    description: Wealth breakdown
  - name: evaluation
    description: Monthly evaluation
  - name: admin
    description: Admin panel operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── User profile ────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  # ─── Dashboard ───────────────────────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get user dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "401":
          description: Unauthorized

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary (level, net worth, XP, completion rates)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: Unauthorized

  /dashboard/stats:
    patch:
      operationId: updateStats
      tags: [dashboard]
      summary: Update character stats (allocate stat points)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatsUpdate"
      responses:
        "200":
          description: Updated dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "401":
          description: Unauthorized

  /dashboard/evaluation:
    post:
      operationId: runEvaluation
      tags: [evaluation]
      summary: Run monthly evaluation to update level and stats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationInput"
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationResult"
        "401":
          description: Unauthorized

  # ─── Quests ──────────────────────────────────────────────────────────────────
  /quests:
    get:
      operationId: listQuests
      tags: [quests]
      summary: List user quests
      responses:
        "200":
          description: List of quests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quest"
        "401":
          description: Unauthorized
    post:
      operationId: createQuest
      tags: [quests]
      summary: Create a new quest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestInput"
      responses:
        "201":
          description: Created quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "401":
          description: Unauthorized

  /quests/{id}:
    patch:
      operationId: updateQuest
      tags: [quests]
      summary: Update a quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestUpdate"
      responses:
        "200":
          description: Updated quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "401":
          description: Unauthorized
        "404":
          description: Quest not found
    delete:
      operationId: deleteQuest
      tags: [quests]
      summary: Delete a quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Quest not found

  /quests/{id}/progress:
    post:
      operationId: logQuestProgress
      tags: [quests]
      summary: Log progress on a quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestProgressInput"
      responses:
        "200":
          description: Updated quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "401":
          description: Unauthorized
        "404":
          description: Quest not found

  # ─── Skills ──────────────────────────────────────────────────────────────────
  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: List user skills
      responses:
        "200":
          description: List of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
        "401":
          description: Unauthorized
    post:
      operationId: createSkill
      tags: [skills]
      summary: Add a new skill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillInput"
      responses:
        "201":
          description: Created skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "401":
          description: Unauthorized

  /skills/{id}:
    patch:
      operationId: updateSkill
      tags: [skills]
      summary: Update a skill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillUpdate"
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "401":
          description: Unauthorized
        "404":
          description: Skill not found
    delete:
      operationId: deleteSkill
      tags: [skills]
      summary: Delete a skill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Skill not found

  /skills/{id}/checkin:
    post:
      operationId: checkinSkill
      tags: [skills]
      summary: Check in a skill (mark as done for today)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "401":
          description: Unauthorized
        "404":
          description: Skill not found

  # ─── Builds (Guild Hall) ─────────────────────────────────────────────────────
  /builds:
    get:
      operationId: listBuilds
      tags: [builds]
      summary: List user builds (income streams / businesses)
      responses:
        "200":
          description: List of builds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Build"
        "401":
          description: Unauthorized
    post:
      operationId: createBuild
      tags: [builds]
      summary: Create a new build
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildInput"
      responses:
        "201":
          description: Created build
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        "401":
          description: Unauthorized

  /builds/{id}:
    patch:
      operationId: updateBuild
      tags: [builds]
      summary: Update a build
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildUpdate"
      responses:
        "200":
          description: Updated build
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Build"
        "401":
          description: Unauthorized
        "404":
          description: Build not found
    delete:
      operationId: deleteBuild
      tags: [builds]
      summary: Delete a build
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Build not found

  # ─── Budget ──────────────────────────────────────────────────────────────────
  /budget:
    get:
      operationId: getBudget
      tags: [budget]
      summary: Get user budget data
      responses:
        "200":
          description: Budget data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "401":
          description: Unauthorized
    patch:
      operationId: updateBudget
      tags: [budget]
      summary: Update budget data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetUpdate"
      responses:
        "200":
          description: Updated budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "401":
          description: Unauthorized

  # ─── Wealth ──────────────────────────────────────────────────────────────────
  /wealth:
    get:
      operationId: getWealth
      tags: [wealth]
      summary: Get user wealth breakdown
      responses:
        "200":
          description: Wealth data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wealth"
        "401":
          description: Unauthorized
    patch:
      operationId: updateWealth
      tags: [wealth]
      summary: Update wealth data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WealthUpdate"
      responses:
        "200":
          description: Updated wealth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wealth"
        "401":
          description: Unauthorized

  # ─── Admin ───────────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get a specific user's full data (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform-wide stats (admin only)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/leaderboard:
    get:
      operationId: adminGetLeaderboard
      tags: [admin]
      summary: Get top users by level and net worth (admin only)
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── User ──────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, clerkId, displayName, isAdmin, createdAt]
      properties:
        id:          { type: integer }
        clerkId:     { type: string }
        displayName: { type: string }
        avatarUrl:   { type: ["string", "null"] }
        isAdmin:     { type: boolean }
        createdAt:   { type: string, format: date-time }

    UserProfileUpdate:
      type: object
      properties:
        displayName: { type: string, minLength: 1 }
        avatarUrl:   { type: string }

    # ─── Dashboard / Character ─────────────────────────────────────────────────
    CharacterStats:
      type: object
      required: [str, vit, int, agi, per, luk, unspentPoints]
      properties:
        str:           { type: integer, description: "Investment Growth" }
        vit:           { type: integer, description: "Net Worth Stability" }
        int:           { type: integer, description: "Diversification" }
        agi:           { type: integer, description: "Savings Rate" }
        per:           { type: integer, description: "Budget Discipline" }
        luk:           { type: integer, description: "Emergency Fund" }
        unspentPoints: { type: integer }

    Dashboard:
      type: object
      required: [id, userId, displayName, title, level, xp, xpToNext, netWorth, totalAssets, stats, systemLog]
      properties:
        id:          { type: integer }
        userId:      { type: integer }
        displayName: { type: string }
        title:       { type: string }
        level:       { type: integer }
        rank:        { type: string }
        xp:          { type: integer }
        xpToNext:    { type: integer }
        netWorth:    { type: number }
        totalAssets: { type: number }
        stats:
          $ref: "#/components/schemas/CharacterStats"
        systemLog:
          type: array
          items: { type: string }

    DashboardSummary:
      type: object
      required: [level, rank, netWorth, xp, xpToNext, questCompletionRate, activeQuests, totalSkills, totalBuilds]
      properties:
        level:               { type: integer }
        rank:                { type: string }
        netWorth:            { type: number }
        xp:                  { type: integer }
        xpToNext:            { type: integer }
        questCompletionRate: { type: number }
        activeQuests:        { type: integer }
        totalSkills:         { type: integer }
        totalBuilds:         { type: integer }

    StatsUpdate:
      type: object
      properties:
        str: { type: integer }
        vit: { type: integer }
        int: { type: integer }
        agi: { type: integer }
        per: { type: integer }
        luk: { type: integer }

    # ─── Evaluation ────────────────────────────────────────────────────────────
    EvaluationInput:
      type: object
      required: [netWorth, savingsRate, budgetAdherence, emergencyFundMonths]
      properties:
        netWorth:             { type: number }
        savingsRate:          { type: number, description: "Percentage 0-100" }
        budgetAdherence:      { type: number, description: "Percentage 0-100" }
        emergencyFundMonths:  { type: number }
        investmentGrowth:     { type: number, description: "Percentage" }
        diversificationScore: { type: number, description: "0-100" }

    EvaluationResult:
      type: object
      required: [xpGained, leveledUp, newLevel, newXp, updatedDashboard]
      properties:
        xpGained:         { type: integer }
        leveledUp:        { type: boolean }
        newLevel:         { type: integer }
        newXp:            { type: integer }
        updatedDashboard:
          $ref: "#/components/schemas/Dashboard"

    # ─── Quests ────────────────────────────────────────────────────────────────
    Quest:
      type: object
      required: [id, userId, title, category, targetAmount, currentAmount, xpReward, frequency, completed, createdAt]
      properties:
        id:            { type: integer }
        userId:        { type: integer }
        title:         { type: string }
        description:   { type: ["string", "null"] }
        category:      { type: string, enum: [SYSTEM, SELF] }
        targetAmount:  { type: ["number", "null"] }
        currentAmount: { type: number }
        xpReward:      { type: integer }
        frequency:     { type: string, enum: [DAILY, WEEKLY, MONTHLY, ONGOING] }
        completed:     { type: boolean }
        createdAt:     { type: string, format: date-time }

    QuestInput:
      type: object
      required: [title, xpReward, frequency]
      properties:
        title:        { type: string, minLength: 1 }
        description:  { type: string }
        category:     { type: string, enum: [SYSTEM, SELF] }
        targetAmount: { type: number }
        xpReward:     { type: integer }
        frequency:    { type: string, enum: [DAILY, WEEKLY, MONTHLY, ONGOING] }

    QuestUpdate:
      type: object
      properties:
        title:         { type: string, minLength: 1 }
        description:   { type: string }
        targetAmount:  { type: number }
        currentAmount: { type: number }
        xpReward:      { type: integer }
        completed:     { type: boolean }

    QuestProgressInput:
      type: object
      required: [amount]
      properties:
        amount: { type: number }

    # ─── Skills ────────────────────────────────────────────────────────────────
    Skill:
      type: object
      required: [id, userId, name, category, type, level, streakCount, lastCheckin, createdAt]
      properties:
        id:          { type: integer }
        userId:      { type: integer }
        name:        { type: string }
        category:    { type: string, enum: [INVESTMENT, SAVINGS, KNOWLEDGE] }
        type:        { type: string, enum: [SYSTEM, SELF] }
        level:       { type: integer }
        streakCount: { type: integer }
        lastCheckin: { type: ["string", "null"], format: date-time }
        xpToNext:    { type: integer }
        createdAt:   { type: string, format: date-time }

    SkillInput:
      type: object
      required: [name, category]
      properties:
        name:     { type: string, minLength: 1 }
        category: { type: string, enum: [INVESTMENT, SAVINGS, KNOWLEDGE] }
        type:     { type: string, enum: [SYSTEM, SELF] }

    SkillUpdate:
      type: object
      properties:
        name:     { type: string, minLength: 1 }
        category: { type: string, enum: [INVESTMENT, SAVINGS, KNOWLEDGE] }

    # ─── Builds ────────────────────────────────────────────────────────────────
    Build:
      type: object
      required: [id, userId, name, description, rank, revenue, expenses, createdAt]
      properties:
        id:          { type: integer }
        userId:      { type: integer }
        name:        { type: string }
        description: { type: string }
        rank:        { type: string, enum: [S, A, B, C, D, E] }
        revenue:     { type: number }
        expenses:    { type: number }
        netProfit:   { type: number }
        createdAt:   { type: string, format: date-time }

    BuildInput:
      type: object
      required: [name, description]
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: string }
        rank:        { type: string, enum: [S, A, B, C, D, E] }
        revenue:     { type: number }
        expenses:    { type: number }

    BuildUpdate:
      type: object
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: string }
        rank:        { type: string, enum: [S, A, B, C, D, E] }
        revenue:     { type: number }
        expenses:    { type: number }

    # ─── Budget ────────────────────────────────────────────────────────────────
    BudgetItem:
      type: object
      required: [id, label, planned, actual]
      properties:
        id:      { type: integer }
        label:   { type: string }
        planned: { type: number }
        actual:  { type: number }

    Budget:
      type: object
      required: [id, userId, monthlyIncome, items, updatedAt]
      properties:
        id:            { type: integer }
        userId:        { type: integer }
        monthlyIncome: { type: number }
        items:
          type: array
          items:
            $ref: "#/components/schemas/BudgetItem"
        updatedAt: { type: string, format: date-time }

    BudgetItemInput:
      type: object
      required: [label, planned, actual]
      properties:
        label:   { type: string }
        planned: { type: number }
        actual:  { type: number }

    BudgetUpdate:
      type: object
      properties:
        monthlyIncome: { type: number }
        items:
          type: array
          items:
            $ref: "#/components/schemas/BudgetItemInput"

    # ─── Wealth ────────────────────────────────────────────────────────────────
    WealthAsset:
      type: object
      required: [id, label, amount, category]
      properties:
        id:       { type: integer }
        label:    { type: string }
        amount:   { type: number }
        category: { type: string, enum: [STOCKS, MUTUAL_FUNDS, REAL_ESTATE, CASH, CRYPTO, OTHER] }

    Wealth:
      type: object
      required: [id, userId, netWorth, assets, updatedAt]
      properties:
        id:       { type: integer }
        userId:   { type: integer }
        netWorth: { type: number }
        assets:
          type: array
          items:
            $ref: "#/components/schemas/WealthAsset"
        updatedAt: { type: string, format: date-time }

    WealthAssetInput:
      type: object
      required: [label, amount, category]
      properties:
        label:    { type: string }
        amount:   { type: number }
        category: { type: string, enum: [STOCKS, MUTUAL_FUNDS, REAL_ESTATE, CASH, CRYPTO, OTHER] }

    WealthUpdate:
      type: object
      properties:
        netWorth: { type: number }
        assets:
          type: array
          items:
            $ref: "#/components/schemas/WealthAssetInput"

    # ─── Admin ─────────────────────────────────────────────────────────────────
    AdminUser:
      type: object
      required: [id, clerkId, displayName, isAdmin, level, netWorth, xp, questCount, skillCount, buildCount, createdAt]
      properties:
        id:          { type: integer }
        clerkId:     { type: string }
        displayName: { type: string }
        avatarUrl:   { type: ["string", "null"] }
        isAdmin:     { type: boolean }
        level:       { type: integer }
        rank:        { type: string }
        netWorth:    { type: number }
        xp:          { type: integer }
        questCount:  { type: integer }
        skillCount:  { type: integer }
        buildCount:  { type: integer }
        createdAt:   { type: string, format: date-time }

    AdminUserDetail:
      type: object
      required: [user, dashboard, quests, skills, builds]
      properties:
        user:
          $ref: "#/components/schemas/AdminUser"
        dashboard:
          $ref: "#/components/schemas/Dashboard"
        quests:
          type: array
          items:
            $ref: "#/components/schemas/Quest"
        skills:
          type: array
          items:
            $ref: "#/components/schemas/Skill"
        builds:
          type: array
          items:
            $ref: "#/components/schemas/Build"

    AdminUserUpdate:
      type: object
      properties:
        displayName: { type: string }
        isAdmin:     { type: boolean }

    AdminStats:
      type: object
      required: [totalUsers, activeUsers, avgLevel, avgNetWorth, totalQuests, totalBuilds]
      properties:
        totalUsers:   { type: integer }
        activeUsers:  { type: integer }
        avgLevel:     { type: number }
        avgNetWorth:  { type: number }
        totalQuests:  { type: integer }
        totalBuilds:  { type: integer }

    LeaderboardEntry:
      type: object
      required: [rank, userId, displayName, level, netWorth, xp]
      properties:
        rank:        { type: integer }
        userId:      { type: integer }
        displayName: { type: string }
        avatarUrl:   { type: ["string", "null"] }
        level:       { type: integer }
        tierRank:    { type: string }
        netWorth:    { type: number }
        xp:          { type: integer }
